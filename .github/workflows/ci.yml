name: CI

# 触发条件：push 到 main 或者开 PR
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:   # 允许在网页上手动点按钮触发

jobs:
  test:
    name: 测试 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    # matrix：同时跑多个 Python 版本，互相独立、并行
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v3

      - name: 设置 Python
        run: uv python install ${{ matrix.python-version }}

      - name: 安装依赖
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: 跑测试 (pytest)
        run: uv run pytest -v
