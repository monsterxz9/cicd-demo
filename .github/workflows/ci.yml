name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v6

      - name: 安装依赖（uv sync 会自动读 .python-version）
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: 跑测试 (pytest)
        run: uv run pytest -v
