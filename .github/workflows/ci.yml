name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest

    steps:
      - name: 侦察这台云端 VM
        run: |
          echo "===== OS ====="
          cat /etc/os-release | head -3
          uname -a
          echo "===== CPU ====="
          nproc
          lscpu | grep -E "Model name|MHz|Socket|Core" | head -5
          echo "===== 内存 ====="
          free -h
          echo "===== 磁盘 ====="
          df -h / | tail -1
          echo "===== 网络 ====="
          curl -s --max-time 3 ifconfig.me && echo
          echo "===== 预装常用工具 ====="
          which python node go rustc docker gh jq aws gcloud 2>/dev/null

      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v6

      - name: 安装依赖（uv sync 会自动读 .python-version）
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: 跑测试 (pytest)
        run: uv run pytest -v
